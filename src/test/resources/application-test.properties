// 测试环境配置
spring.application.name=Simple_Library_System_Test
server.port=0
server.servlet.context-path=/BookManager

// H2 内存数据库配置
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=root
spring.datasource.password=Lsp195815
spring.datasource.driver-class-name=org.h2.Driver

// JPA 配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

// H2 Console（测试时启用，方便调试）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

// Jackson 配置
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

// Token 配置
app.token.expire-seconds=3600
app.upload-dir=uploads

// 日志配置
logging.level.edu.cupk.simple_library_system=DEBUG
logging.level.org.springframework.web=DEBUG
